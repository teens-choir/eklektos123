kind = "web"
previewPath = "/"
title = "Teenagers Choir"
version = "1.0.0"
id = "artifacts/choir-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18083

[services.development]
run = "pnpm --filter @workspace/choir-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/choir-app", "run", "build" ]
publicDir = "artifacts/choir-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18083"
BASE_PATH = "/"
